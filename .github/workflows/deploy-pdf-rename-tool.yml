name: Deploy PDF Rename Tool to GAS

on:
  push:
    branches:
      - main
      - 'claude/enhance-pdf-renaming-tool-*'
    paths:
      - 'pdf-rename-tool/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Setup clasp credentials
        run: |
          echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: Push to GAS
        working-directory: pdf-rename-tool
        run: clasp push --force

      - name: Deploy as Web App
        working-directory: pdf-rename-tool
        run: |
          # 既存のデプロイメントを更新（最新版に）
          DEPLOY_ID=$(clasp deployments | grep -v '@HEAD' | tail -1 | awk '{print $2}')
          if [ -n "$DEPLOY_ID" ] && [ "$DEPLOY_ID" != "-" ]; then
            clasp deploy --deploymentId "$DEPLOY_ID" --description "Auto-deploy $(date +%Y%m%d-%H%M%S)"
          else
            clasp deploy --description "Auto-deploy $(date +%Y%m%d-%H%M%S)"
          fi
          echo "✅ Deploy complete"
