name: Deploy PDF Rename Tool to GAS

on:
  push:
    branches:
      - main
      - 'claude/enhance-pdf-renaming-tool-*'
    paths:
      - 'pdf-rename-tool/**'
      - '.github/workflows/deploy-pdf-rename-tool.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Setup clasp credentials
        env:
          CLASP_CREDENTIALS: ${{ secrets.CLASP_CREDENTIALS }}
        run: |
          echo "$CLASP_CREDENTIALS" > ~/.clasprc.json
          echo "✅ Credentials file created"
          test -s ~/.clasprc.json && echo "File is not empty" || (echo "❌ CLASP_CREDENTIALS secret is empty!" && exit 1)

      - name: Push to GAS
        working-directory: pdf-rename-tool
        run: |
          echo "Pushing to GAS..."
          clasp push --force
          echo "✅ Push complete"

      - name: Deploy as Web App
        working-directory: pdf-rename-tool
        run: |
          echo "Deploying..."
          DEPLOYMENTS=$(clasp deployments 2>&1)
          echo "$DEPLOYMENTS"
          DEPLOY_ID=$(echo "$DEPLOYMENTS" | grep -v '@HEAD' | grep '^-' | tail -1 | awk '{print $2}')
          if [ -n "$DEPLOY_ID" ] && [ "$DEPLOY_ID" != "-" ]; then
            clasp deploy --deploymentId "$DEPLOY_ID" --description "Auto-deploy $(date +%Y%m%d-%H%M%S)"
          else
            clasp deploy --description "Auto-deploy $(date +%Y%m%d-%H%M%S)"
          fi
          echo "✅ Deploy complete"
